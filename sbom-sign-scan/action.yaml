name: 'ReARM SBOM Generator'
description: 'Generate SBOMs, perform signing, and CodeQL analysis - outputs artifact JSON for use with ReARM'
branding:
  icon: 'package'
  color: 'blue'
inputs:
  image_full_name:
    description: "Full name of the Docker image with registry prefix"
    required: true
  image_digest:
    description: "SHA 256 digest of the image artifact"
    required: true
  rearm_short_version:
    description: "Docker and filesystem safe version from ReARM for this release"
    required: true
  rearm_full_version:
    description: "Version obtained from ReARM for this release"
    required: true
  deliverable_type:
    description: "Type of artifact created by this release [CONTAINER, FILE]"
    required: false
    default: 'CONTAINER'
  enable_sbom:
    required: false
    default: 'false'
    description: "Generates SBOM and stores it along with the artifact"
  source_code_sbom_type:
    required: false
    default: 'none'
    description: "Generates SBOM based on source code analysis, possible values: npm, helm, custom, go, other, none. Use 'custom' to follow Dockerfile.sbom with expected output in /sbom/sbom.json"
  registry_username:
    description: "Username for image registry"
    required: false
  registry_password:
    description: "Password for image registry"
    required: false
  registry_host:
    description: "Host for image registry"
    default: null
    required: false
  repo_path:
    description: "Repository path relative to workspace root"
    required: false
    default: "."
  enable_public_cosign_sigstore:
    required: false
    default: 'false'
    description: "Sign deliverables and SBOMs using public sigstore via cosign"
  enable_codeql:
    required: false
    default: 'false'
    description: "Enable CodeQL analysis"
  codeql_language:
    required: false
    default: 'none'
    description: "Language to analyze with CodeQL, use 'custom' to follow Dockerfile.sarif with expected output in /sarif/results.sarif"
  enable_securesbom:
    required: false
    default: 'false'
    description: "Enable SecureSBOM signing of SBOMs by ShiftLeftCyber"
  extract_commit_signature:
    required: false
    default: 'true'
    description: "When true, extract the HEAD commit's git-level signature (SSH/GPG) and attach it as a SIGNATURE + SIGNED_PAYLOAD scearts entry so ReARM can verify the commit's cryptographic attribution. No-op when the commit is unsigned."
  securesbom_pub_key_id:
    required: false
    description: "Public key id to sign with SecureSBOM by ShiftLeftCyber"
  securesbom_host:
    required: false
    description: "SecureSBOM (by ShiftLeftCyber) host"
  securesbom_api_key:
    required: false
    description: "SecureSBOM (by ShiftLeftCyber) API key"
outputs:
  scearts:
    description: "Source Code Entry artifacts JSON array"
    value: ${{ steps.generate-artifacts.outputs.scearts }}
  odelartsjson:
    description: "Output Deliverable artifacts JSON array"
    value: ${{ steps.generate-artifacts.outputs.odelartsjson }}
  purl:
    description: "Package URL for the deliverable (only for CONTAINER type)"
    value: ${{ steps.generate-artifacts.outputs.purl }}
runs:
  using: "composite"
  steps:
    - id: setup-node-js
      if: ${{ inputs.enable_sbom == 'true' }}
      name: Setup Node JS
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: 24
    - name: Login to DockerHub
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      if: ${{ inputs.enable_sbom == 'true' && inputs.deliverable_type == 'CONTAINER' && inputs.registry_host == null }}
      with:
        username: ${{inputs.registry_username}}
        password: ${{inputs.registry_password}}
    - name: Login to Container Registry
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
      if: ${{ inputs.enable_sbom == 'true' && inputs.deliverable_type == 'CONTAINER' && inputs.registry_host != null }}
      with:
        registry: ${{inputs.registry_host}}
        username: ${{inputs.registry_username}}
        password: ${{inputs.registry_password}}
    - id: docker-pull-save
      name: Pull and Save Docker Image as tar
      shell: bash
      if: ${{ inputs.enable_sbom == 'true' && inputs.deliverable_type == 'CONTAINER' }}
      run: |
        cd ${INPUTS_REPO_PATH}
        docker pull ${INPUTS_IMAGE_FULL_NAME}@${INPUTS_IMAGE_DIGEST}
        docker save -o docker-${INPUTS_REARM_SHORT_VERSION}.tar ${INPUTS_IMAGE_FULL_NAME}@${INPUTS_IMAGE_DIGEST}
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_IMAGE_FULL_NAME: ${{inputs.image_full_name}}
        INPUTS_IMAGE_DIGEST: ${{inputs.image_digest}}
        INPUTS_REARM_SHORT_VERSION: ${{inputs.rearm_short_version}} 
    - id: install-cdxgen
      if: ${{ inputs.enable_sbom == 'true' }}
      name: Install cdxgen cli
      shell: bash
      run: npm install -g @cyclonedx/cdxgen@12.3.3 --ignore-scripts
    - id: install-cosign
      if: ${{ inputs.enable_public_cosign_sigstore == 'true' }}
      name: Install Cosign
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
    - id: cosign-sign
      if: ${{ inputs.enable_public_cosign_sigstore == 'true' && inputs.deliverable_type == 'CONTAINER' }}
      name: Sign container deliverable with cosign
      shell: bash
      run: |
        cd ${INPUTS_REPO_PATH}
        cosign sign -y --output-payload deliverable-cosign.sigpl --output-signature deliverable-cosign.sig --output-certificate deliverable-cosign.cert ${INPUTS_IMAGE_FULL_NAME}@${INPUTS_IMAGE_DIGEST}
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_IMAGE_FULL_NAME: ${{inputs.image_full_name}}
        INPUTS_IMAGE_DIGEST: ${{inputs.image_digest}}
    - name: Initialize CodeQL
      if: ${{ inputs.enable_codeql == 'true' && inputs.codeql_language != 'custom'}}
      uses: github/codeql-action/init@c43362b91a940600cde2ebae39ec7a35ad66bdc0 # CodeQL Bundle v2.23.8
      with:
        languages: ${{ inputs.codeql_language }}
        source-root: ${{ inputs.repo_path }}
    - name: Run Containerized SAST
      if: ${{ inputs.enable_codeql == 'true' && inputs.codeql_language == 'custom'}}
      shell: bash
      run: |
        cd ${INPUTS_REPO_PATH}
        mkdir codeql-results
        docker build -t sarif-container -f Dockerfile.sarif .
        docker run -d --name sarif-container --rm --entrypoint sleep sarif-container 60
        sleep 3
        docker cp sarif-container:/sarif/results.sarif ./codeql-results/${INPUTS_CODEQL_LANGUAGE}.sarif
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_CODEQL_LANGUAGE: ${{inputs.codeql_language}}
    - name: Run CodeQL
      if: ${{ inputs.enable_codeql == 'true' && inputs.codeql_language != 'custom'}}
      uses: github/codeql-action/analyze@c43362b91a940600cde2ebae39ec7a35ad66bdc0 # CodeQL Bundle v2.23.8
      with:
        upload: false
        output: ${{ inputs.repo_path }}/codeql-results
    - name: Verify CodeQL output present
      if: ${{ inputs.enable_codeql == 'true' }}
      shell: bash
      run: |
        du -h ${INPUTS_REPO_PATH}/codeql-results/${INPUTS_CODEQL_LANGUAGE}.sarif
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_CODEQL_LANGUAGE: ${{inputs.codeql_language}}
    - id: generate-artifacts
      name: Generate SBOM artifacts
      shell: bash
      run: |
        cd ${INPUTS_REPO_PATH}

        # Function to sign SBOM and build artifacts JSON
        # Usage: sign_sbom <bom_file> <output_prefix>
        # Returns artifacts JSON fragment via SIGN_RESULT variable
        sign_sbom() {
          local bom_file="$1"
          local prefix="$2"
          local has_artifacts=false
          SIGN_RESULT=""

          # Sign with SecureSBOM by ShiftLeftCyber if enabled
          if [[ "${INPUTS_ENABLE_SECURESBOM}" == 'true' ]]; then
            mv "${bom_file}" "${bom_file}.tmp"
            curl --location "${INPUTS_SECURESBOM_HOST}/api/v1/sbom/sign?pretty=false" \
              --header "x-api-key: ${INPUTS_SECURESBOM_API_KEY}" \
              --form "sbom=@\"${bom_file}.tmp\"" \
              --form 'key_id="${INPUTS_SECURESBOM_PUB_KEY_ID}"' > "${bom_file}"
            rm "${bom_file}.tmp"

            curl --location "${INPUTS_SECURESBOM_HOST}/api/v1/keys/public?key_id=${INPUTS_SECURESBOM_PUB_KEY_ID}&format=pem" \
              --header "x-api-key: ${INPUTS_SECURESBOM_API_KEY}" > "./${prefix}-securesbom-public-key.pem"
            SIGN_RESULT+=', "artifacts": [{"type": "PUBLIC_KEY","filePath": "./'"${prefix}"'-securesbom-public-key.pem", "tags":[{"key":"io.reliza.signing_platform","value":"SECURESBOM"}, {"key":"io.reliza.securesbom.pub_key_id","value":"${INPUTS_SECURESBOM_PUB_KEY_ID}"}]}'
            has_artifacts=true
          fi

          # Add cosign artifacts if enabled
          if [[ "${INPUTS_ENABLE_PUBLIC_COSIGN_SIGSTORE}" == 'true' ]]; then
            cosign sign-blob -y --output-signature "./${prefix}-cosign.sig" --output-certificate "./${prefix}-cosign.cert" "${bom_file}"
            if [[ $has_artifacts == true ]]; then
              SIGN_RESULT+=',{"type": "SIGNATURE","filePath": "./'"${prefix}"'-cosign.sig", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]},{"type": "CERTIFICATE_X_509","filePath": "./'"${prefix}"'-cosign.cert", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]}'
            else
              SIGN_RESULT+=', "artifacts": [{"type": "SIGNATURE","filePath": "./'"${prefix}"'-cosign.sig", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]},{"type": "CERTIFICATE_X_509","filePath": "./'"${prefix}"'-cosign.cert", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]}'
              has_artifacts=true
            fi
          fi

          # Close artifacts array if it was opened
          if [[ $has_artifacts == true ]]; then
            SIGN_RESULT+=']'
          fi
        }

        # Initialize output variables
        purl=""

        # Establish purl for CONTAINER type
        if [[ "${INPUTS_DELIVERABLE_TYPE}" == 'CONTAINER' ]]; then
          url4purl=oci://${INPUTS_IMAGE_FULL_NAME}:${INPUTS_REARM_SHORT_VERSION}
          docker pull registry.relizahub.com/library/url2purl-cli:25.07.0@sha256:05f849cfedbc31c6c8d11819e42efb4eb5e95198696978ca1ad84b010d52e952
          purl=$(docker run --rm registry.relizahub.com/library/url2purl-cli:25.07.0@sha256:05f849cfedbc31c6c8d11819e42efb4eb5e95198696978ca1ad84b010d52e952 $url4purl)
          echo "deliverable purl=$purl"
        fi

        # Initialize artifact output variables
        scearts=""
        odelarts=""

        # Generate SBOMs if Enabled
        export FETCH_LICENSE=true
        if [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} == 'npm' ]]
        then
          cdxgen ./ --project-version "${INPUTS_REARM_FULL_VERSION}" --lifecycle build --spec-version 1.6 -t npm -o fs.cdx.bom.json
        elif [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} == 'helm' ]]
        then
          cdxgen ./ --project-version "${INPUTS_REARM_FULL_VERSION}" --lifecyle build --spec-version 1.6 -t helm -o fs.cdx.bom.json
        elif [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} == 'go' ]]
        then      
          cdxgen ./ --project-version "${INPUTS_REARM_FULL_VERSION}" --lifecycle build --spec-version 1.6 -t go -o fs.cdx.bom.json
        elif [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} == 'other' ]]
        then      
          cdxgen ./ --project-version "${INPUTS_REARM_FULL_VERSION}" --lifecycle build --spec-version 1.6 -o fs.cdx.bom.json
        elif [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} == 'custom' ]]
        then
          docker build -t sbom-container -f Dockerfile.sbom --build-arg VERSION="${INPUTS_REARM_FULL_VERSION}" .
          docker run -d --name sbom-container --rm --entrypoint sleep sbom-container 60
          sleep 3
          docker cp sbom-container:/sbom/sbom.json ./fs.cdx.bom.json
        fi
        if [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_SOURCE_CODE_SBOM_TYPE} != 'none' ]]
        then
          du -h ./fs.cdx.bom.json

          # Sign SBOM and build scearts JSON array
          sign_sbom "./fs.cdx.bom.json" "fs-bom"
          du -h ./fs.cdx.bom.json
          scearts='[{"bomFormat": "CYCLONEDX","type": "BOM","filePath": "./fs.cdx.bom.json"'"${SIGN_RESULT}"'}'

          # Add CodeQL SARIF artifact if enabled
          if [[ ${INPUTS_ENABLE_CODEQL} == 'true' ]]
          then
            scearts+=',{"type": "CODE_SCANNING_RESULT","filePath": "./codeql-results/${INPUTS_CODEQL_LANGUAGE}.sarif"}'
          fi

          scearts+=']'
        fi

        if [[ ${INPUTS_ENABLE_SBOM} == 'true' && ${INPUTS_DELIVERABLE_TYPE} == 'CONTAINER' ]]
        then
          export FETCH_LICENSE=false
          pip install blint==3.1.2
          cdxgen docker-${INPUTS_REARM_SHORT_VERSION}.tar -t docker --lifecycle build --project-version "${INPUTS_REARM_FULL_VERSION}" --spec-version 1.6 -o docker.cdx.bom.raw.json
          du -h ./docker.cdx.bom.raw.json
          rearm bomutils fixpurl -f ./docker.cdx.bom.raw.json -o ./docker.cdx.bom.json --newpurl "${purl}"

          # Sign deliverable SBOM
          sign_sbom "./docker.cdx.bom.json" "docker-cdx-bom"
          odelarts='[{"bomFormat": "CYCLONEDX","type": "BOM","filePath": "./docker.cdx.bom.json"'"${SIGN_RESULT}"'}'

          # Add deliverable cosign artifacts if enabled
          if [[ ${INPUTS_ENABLE_PUBLIC_COSIGN_SIGSTORE} == 'true' ]]; then
            odelarts+=',{"type": "SIGNED_PAYLOAD","filePath": "./deliverable-cosign.sigpl", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]},{"type": "SIGNATURE","filePath": "./deliverable-cosign.sig", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]},{"type": "CERTIFICATE_X_509","filePath": "./deliverable-cosign.cert", "tags":[{"key":"io.reliza.signing_platform","value":"COSIGN"}]}'
          fi
          odelarts+=']'
        fi

        # Extract HEAD commit signature (SSH/GPG) into a SIGNATURE +
        # SIGNED_PAYLOAD pair so ReARM can verify the cryptographic
        # attribution downstream. Independent of SBOM generation — runs
        # even when enable_sbom=false. Silent no-op on unsigned commits.
        #
        # Skipped when initialize/action.yaml has already attached the
        # same pair at getversion time (REARM_SIGNATURE_PRE_ATTACHED=true
        # written to $GITHUB_ENV by the initialize step). Without that
        # guard both steps would attach independently — different artifact
        # UUIDs but identical contents — and the SCE row would end up
        # with two duplicate signature pairs.
        if [[ "${INPUTS_EXTRACT_COMMIT_SIGNATURE}" == 'true' && "$REARM_SIGNATURE_PRE_ATTACHED" != 'true' ]]
        then
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_RAW="./commit-raw.bin"
          git cat-file commit "$COMMIT_SHA" > "$COMMIT_RAW"
          # Strip gpgsig header + its space-indented continuation lines
          # → signature bytes; the rest is the signed payload (the
          # commit-object body git/ssh-keygen hashes & verifies).
          awk '
              BEGIN { in_sig = 0; in_hdr = 1 }
              {
                  if (in_hdr && $0 == "") {
                      in_hdr = 0; in_sig = 0; print; next
                  }
                  if (in_hdr) {
                      if ($0 ~ /^gpgsig /) {
                          in_sig = 1; sub(/^gpgsig /, "", $0)
                          print $0 > "./commit-signature.bin"; next
                      }
                      if (in_sig && substr($0, 1, 1) == " ") {
                          sub(/^ /, "", $0)
                          print $0 > "./commit-signature.bin"; next
                      }
                      in_sig = 0; print; next
                  }
                  print
              }
          ' "$COMMIT_RAW" > ./commit-signed-payload.bin
          rm "$COMMIT_RAW"

          if [[ -s ./commit-signature.bin ]]; then
            if head -1 ./commit-signature.bin | grep -q "BEGIN SSH SIGNATURE"; then
              SIG_FORMAT="SSH"
            elif head -1 ./commit-signature.bin | grep -q "BEGIN PGP SIGNATURE"; then
              SIG_FORMAT="GPG"
            else
              SIG_FORMAT=""
            fi
            if [[ -n "$SIG_FORMAT" ]]; then
              SIG_ENTRY='{"type":"SIGNATURE","filePath":"./commit-signature.bin","displayIdentifier":"'"${COMMIT_SHA}"'.sig","tags":[{"key":"signatureSubject","value":"COMMIT"},{"key":"signatureFormat","value":"'"${SIG_FORMAT}"'"},{"key":"signedCommitSha","value":"'"${COMMIT_SHA}"'"}]}'
              PAYLOAD_ENTRY='{"type":"SIGNED_PAYLOAD","filePath":"./commit-signed-payload.bin","displayIdentifier":"'"${COMMIT_SHA}"'.payload","tags":[{"key":"signedCommitSha","value":"'"${COMMIT_SHA}"'"}]}'
              if [[ -z "$scearts" ]]; then
                # SBOM gen didn't run — start a fresh array with just
                # the signature pair.
                scearts="[${SIG_ENTRY},${PAYLOAD_ENTRY}]"
              else
                # SBOM gen already built scearts as a closed array —
                # strip the trailing ']', append the pair, re-close.
                scearts="${scearts%]},${SIG_ENTRY},${PAYLOAD_ENTRY}]"
              fi
              echo "Attached commit signature: ${SIG_FORMAT} ${COMMIT_SHA}"
            else
              echo "WARN: extracted gpgsig header but content is neither SSH nor PGP — skipping" >&2
              rm ./commit-signature.bin ./commit-signed-payload.bin
            fi
          else
            echo "Commit ${COMMIT_SHA} is unsigned — skipping signature artifacts"
            rm -f ./commit-signature.bin ./commit-signed-payload.bin
          fi
        fi

        # Output the generated artifacts JSON and purl
        echo "scearts=${scearts}" >> $GITHUB_OUTPUT
        echo "odelartsjson=${odelarts}" >> $GITHUB_OUTPUT
        echo "purl=${purl}" >> $GITHUB_OUTPUT

        echo "Generated scearts: ${scearts}"
        echo "Generated odelartsjson: ${odelarts}"
        echo "Generated purl: ${purl}"
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_ENABLE_SECURESBOM: ${{ inputs.enable_securesbom }}
        INPUTS_SECURESBOM_HOST: ${{ inputs.securesbom_host }}
        INPUTS_SECURESBOM_API_KEY: ${{ inputs.securesbom_api_key }}
        INPUTS_SECURESBOM_PUB_KEY_ID: ${{ inputs.securesbom_pub_key_id }}
        INPUTS_ENABLE_PUBLIC_COSIGN_SIGSTORE: ${{ inputs.enable_public_cosign_sigstore}}
        INPUTS_DELIVERABLE_TYPE: ${{inputs.deliverable_type}}
        INPUTS_IMAGE_FULL_NAME: ${{inputs.image_full_name}}
        INPUTS_REARM_SHORT_VERSION: ${{inputs.rearm_short_version}}
        INPUTS_ENABLE_SBOM: ${{inputs.enable_sbom}}
        INPUTS_SOURCE_CODE_SBOM_TYPE: ${{inputs.source_code_sbom_type}}
        INPUTS_REARM_FULL_VERSION: ${{ inputs.rearm_full_version }}
        INPUTS_ENABLE_CODEQL: ${{ inputs.enable_codeql }}
        INPUTS_CODEQL_LANGUAGE: ${{inputs.codeql_language}}
        INPUTS_EXTRACT_COMMIT_SIGNATURE: ${{ inputs.extract_commit_signature }}
