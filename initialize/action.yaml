name: 'ReARM Initialize Action'
description: 'GitHub Action to initialize ReARM flow'
branding:
  icon: 'anchor'
  color: 'green'
inputs:
  rearm_api_key:
    description: "ReARM API Key"
    required: true
  rearm_api_id:
    description: "ReARM API Key ID"
    required: true
  rearm_api_url:
    description: "ReARM API URL"
    required: false
    default: "https://demo.rearmhq.com"
  repo_path:
    description: "Repository path (relative to workspace root)"
    required: false
    default: "."
  branch:
    description: "Branch name (defaults to current branch)"
    required: false
  version:
    description: "Version to use (if not provided, will be obtained from ReARM)"
    required: false
  create_component:
    description: "Create component if it doesn't exist"
    required: false
    default: "false"
  create_component_version_schema:
    description: "Version schema for new component"
    required: false
    default: "semver"
  create_component_branch_version_schema:
    description: "Branch version schema for new component"
    required: false
    default: "semver"
  allow_rebuild:
    description: "Allow rebuild of existing version"
    required: false
    default: "false"
  component:
    description: "Component UUID (optional)"
    required: false
  enable_invisible_char_check:
    description: "Scan files changed since the previous release for invisible/trojan-source characters using anti-trojan-source. Falls back to scanning all tracked files if no previous release is known or the last commit is unreachable. Fails the build on any finding."
    required: false
    default: 'false'
outputs:
  do_build:
    description: "Whether a build is needed"
    value: ${{ steps.initialize.outputs.do_build }}
  last_commit:
    description: "Last commit from previous release"
    value: ${{ steps.initialize.outputs.last_commit }}
  full_version:
    description: "Full version string"
    value: ${{ steps.initialize.outputs.full_version }}
  short_version:
    description: "Docker-tag-safe version string"
    value: ${{ steps.initialize.outputs.short_version }}
  build_start:
    description: "Build start timestamp"
    value: ${{ steps.initialize.outputs.build_start }}
  commit_list:
    description: "Base64 encoded list of commits for SCE"
    value: ${{ steps.initialize.outputs.commit_list }}
  sce_commit:
    description: "SCE commit hash"
    value: ${{ steps.initialize.outputs.sce_commit }}
  sce_commit_message:
    description: "SCE commit message"
    value: ${{ steps.initialize.outputs.sce_commit_message }}
  sce_commit_date:
    description: "SCE commit date"
    value: ${{ steps.initialize.outputs.sce_commit_date }}
  sce_vcs_uri:
    description: "SCE VCS URI"
    value: ${{ steps.initialize.outputs.sce_vcs_uri }}
runs:
  using: "composite"
  steps:
    # PR registration runs unconditionally on every `pull_request` event,
    # before the do_build / DO_BUILD check on the next step. The
    # initialize step's inline upsert (--pr-* flags on
    # addrelease / getversion) only fires when DO_BUILD=true, but
    # GitHub fires both `push` and `pull_request` events for the same
    # head commit. Whichever event creates the release first sees
    # DO_BUILD=true and registers the PR; the other sees DO_BUILD=false
    # (release already exists) and never runs the inline upsert.
    # Without this dedicated step, the PR row would be lost whenever
    # the push event wins the race.
    #
    # The CLI subcommand is idempotent on (targetVcsRepository,
    # identity), so it's safe to call multiple times per CI run
    # (e.g. once per component in a monorepo). When the SCE for the
    # commit doesn't exist yet, the PR row is registered without a
    # head and the subsequent addrelease call (which carries the same
    # --pr-* flags) advances the head once the SCE is persisted.
    #
    # Requires CLI ≥ 26.05.3 (the version that introduced
    # `rearm pullrequest upsert`). Skipped on non-PR events.
    - id: pr-register
      name: Register PullRequest in ReARM
      if: ${{ github.event.pull_request.number != null }}
      shell: bash
      env:
        REARM_API_KEY: ${{ inputs.rearm_api_key }}
        REARM_APIKEYID: ${{ inputs.rearm_api_id }}
        REARM_API_URL: ${{ inputs.rearm_api_url }}
        REPO_PATH: ${{ inputs.repo_path }}
        COMPONENT: ${{ inputs.component }}
        VCS_URI: ${{ github.server_url }}/${{ github.repository }}
        COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_STATE: ${{ github.event.pull_request.merged && 'MERGED' || (github.event.pull_request.state == 'closed' && 'CLOSED' || 'OPEN') }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
        PR_TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
        PR_ENDPOINT: ${{ github.event.pull_request.html_url }}
      run: |
        set -e
        args=(
          "pullrequest" "upsert"
          "-i" "$REARM_APIKEYID"
          "-k" "$REARM_API_KEY"
          "-u" "$REARM_API_URL"
          "--identity" "$PR_NUMBER"
          "--state" "$PR_STATE"
          "--commit" "$COMMIT"
        )
        if [ -n "$COMPONENT" ]; then
          args+=("--component" "$COMPONENT")
        else
          args+=("--vcsuri" "$VCS_URI")
          [ -n "$REPO_PATH" ] && args+=("--repo-path" "$REPO_PATH")
        fi
        [ -n "$PR_TITLE" ] && args+=("--title" "$PR_TITLE")
        [ -n "$PR_SOURCE_BRANCH" ] && args+=("--source-branch-name" "$PR_SOURCE_BRANCH")
        [ -n "$PR_TARGET_BRANCH" ] && args+=("--target-branch-name" "$PR_TARGET_BRANCH")
        [ -n "$PR_ENDPOINT" ] && args+=("--endpoint" "$PR_ENDPOINT")
        echo "Registering PR #$PR_NUMBER ($PR_STATE) on $VCS_URI / $REPO_PATH @ $COMMIT"
        rearm "${args[@]}"

    - id: initialize
      name: Initialize ReARM Release
      shell: bash
      env:
        REARM_API_KEY: ${{ inputs.rearm_api_key }}
        rearm_api_id: ${{ inputs.rearm_api_id }}
        REARM_API_URL: ${{ inputs.rearm_api_url }}
        REPO_PATH: ${{ inputs.repo_path }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_VERSION: ${{ inputs.version }}
        CREATE_COMPONENT: ${{ inputs.create_component }}
        CREATE_COMPONENT_VERSION_SCHEMA: ${{ inputs.create_component_version_schema }}
        CREATE_COMPONENT_BRANCH_VERSION_SCHEMA: ${{ inputs.create_component_branch_version_schema }}
        ALLOW_REBUILD: ${{ inputs.allow_rebuild }}
        COMPONENT: ${{ inputs.component }}
        VCS_URI: ${{ github.server_url }}/${{ github.repository }}
        # On `pull_request` events, github.sha is the synthetic merge
        # commit and github.ref is `refs/pull/N/merge` — neither is
        # what callers actually mean by "the commit/branch being
        # released". Prefer the PR's actual head metadata when in a PR
        # context so the release lands on the source branch (unified
        # history pre- and post-PR-open) and check-runs land on the
        # SHA branch protection actually looks at. Falls back to
        # github.sha / github.ref on push and other events.
        # Note: GITHUB_REF is reserved by the runner and step-level env
        # cannot override it — the override is silently ignored, leaving
        # the synthetic merge ref. Use a non-GITHUB_* name instead.
        COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        RESOLVED_REF: ${{ github.head_ref && format('refs/heads/{0}', github.head_ref) || github.ref }}
        # PR metadata for the optional --pr-* forwarding to ReARM. Only
        # populated on `pull_request` events; addrelease / getversion
        # pass these through to the source branch's pullRequestData via
        # the new `pullRequest` GraphQL input.
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_STATE: ${{ github.event.pull_request.number && 'OPEN' || '' }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
        PR_ENDPOINT: ${{ github.event.pull_request.html_url }}
      run: |
        set -e
        
        # Set BUILD_START for use in finalize task
        BUILD_START=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        # Determine branch
        if [ -n "$INPUT_BRANCH" ]; then
          BRANCH="$INPUT_BRANCH"
        else
          BRANCH="$RESOLVED_REF"
        fi
        
        echo "Repository URI: $VCS_URI"
        echo "Repository Path: $REPO_PATH"
        echo "Branch: $BRANCH"
        echo "Commit: $COMMIT"
        
        if [ -n "$INPUT_VERSION" ]; then
          echo "Version (from input): $INPUT_VERSION"
        else
          echo "Version will be obtained from ReARM"
        fi
        
        # Function to get latest release and check if build is needed
        get_latest_release() {
          local upto_version="$1"
          local get_latest_args=(
            "getlatestrelease"
            "-k" "$REARM_API_KEY"
            "-i" "$rearm_api_id"
            "-u" "$REARM_API_URL"
            "--vcsuri" "$VCS_URI"
            "--repo-path" "$REPO_PATH"
            "--branch" "$BRANCH"
          )
          
          if [ -n "$upto_version" ]; then
            get_latest_args+=("--uptoversion" "$upto_version")
          fi
          
          if [ -n "$COMPONENT" ]; then
            get_latest_args+=("--component" "$COMPONENT")
          fi
          
          local latest_output
          if ! latest_output=$(rearm "${get_latest_args[@]}" 2>&1); then
            # On a brand-new component (first run with create_component=true) the
            # backend can fail getlatestrelease two different ways:
            #   * "VCS repository <uri> not found" — no component in the org has
            #     ever pointed at this VCS URI yet
            #   * "Component not found for VCS UUID '<uuid>' and repo path '<path>'"
            #     — the VCS URI is registered (sibling job in a monorepo created
            #     it) but no component is mapped to *this* repo path yet
            # Both mean "there is no prior release for this component" — let the
            # calling fallback set DO_BUILD=true so the create flow in
            # addrelease/getversion can run. Surface every other error.
            if echo "$latest_output" | grep -qE "VCS repository .* not found|Component not found for VCS"; then
              echo "No previous release found for this component (first build):" >&2
              echo "$latest_output" >&2
              return 1
            fi
            echo "ERROR: rearm getlatestrelease failed:" >&2
            echo "$latest_output" >&2
            exit 1
          fi

          LAST_COMMIT=$(echo "$latest_output" | jq -r '.sourceCodeEntryDetails.commit // empty' 2>/dev/null || echo "")
          echo "Last Commit: $LAST_COMMIT"
          
          DO_BUILD="false"
          if [ -n "$LAST_COMMIT" ] && [ "$LAST_COMMIT" != "null" ]; then
            # Check if lastCommit exists locally (may not in shallow checkout)
            if git cat-file -t "$LAST_COMMIT" >/dev/null 2>&1; then
              # Check for diff
              local diff_output
              diff_output=$(git diff "${LAST_COMMIT}..${COMMIT}" -- "$REPO_PATH" 2>/dev/null) || diff_output=""
              if [ -n "$diff_output" ]; then
                DO_BUILD="true"
              fi
            else
              echo "Last commit $LAST_COMMIT not available locally (shallow checkout), assuming build is needed."
              echo "Make sure to use fetch-depth: 0 in your checkout step to avoid shallow clone."
              DO_BUILD="true"
            fi
          else
            DO_BUILD="true"
          fi
        }
        
        # Step 1: Get latest release and check if build is needed
        echo "Checking for changes since last release..."
        DO_BUILD="false"
        LAST_COMMIT=""
        
        get_latest_release "$INPUT_VERSION" || {
          echo "No previous release found, build is needed"
          DO_BUILD="true"
        }
        
        echo "DO_BUILD: $DO_BUILD"
        
        # Step 2: If build is needed, create pending release
        FULL_VERSION=""
        SHORT_VERSION=""
        
        if [ "$DO_BUILD" = "true" ]; then
          echo "Initializing pending release..."
          
          # Get commit message and date — pin to $COMMIT explicitly so
          # the metadata is consistent with the SHA we send to ReARM.
          # Without the explicit ref, `git log -1` reads HEAD, which on
          # `pull_request` events is the synthetic merge commit even
          # though we resolved $COMMIT to the PR's actual head SHA.
          COMMIT_MESSAGE=$(git log -1 --pretty=%s "$COMMIT" -- "$REPO_PATH" 2>/dev/null || echo "")
          COMMIT_DATE=$(git log -1 --date=iso-strict --pretty=%ad "$COMMIT" -- "$REPO_PATH" 2>/dev/null || echo "")
          
          # Get commits since last release for getversion command
          COMMITS_BASE64=""
          if [ -n "$LAST_COMMIT" ] && [ "$LAST_COMMIT" != "null" ]; then
            COMMITS_OUTPUT=$(git log "${LAST_COMMIT}..${COMMIT}" --date=iso-strict --pretty="%H|||%ad|||%s|||%an|||%ae" -- "$REPO_PATH" 2>/dev/null || echo "")
          else
            COMMITS_OUTPUT=$(git log -1 --date=iso-strict --pretty="%H|||%ad|||%s|||%an|||%ae" -- "$REPO_PATH" 2>/dev/null || echo "")
          fi
          
          if [ -n "$COMMITS_OUTPUT" ]; then
            COMMITS_BASE64=$(echo "$COMMITS_OUTPUT" | base64 -w 0 2>/dev/null || echo "$COMMITS_OUTPUT" | base64 2>/dev/null)
          fi
          
          if [ -n "$INPUT_VERSION" ]; then
            # Version provided - use addrelease with provided version
            add_release_args=(
              "addrelease"
              "-k" "$REARM_API_KEY"
              "-i" "$rearm_api_id"
              "-u" "$REARM_API_URL"
              "--commit" "$COMMIT"
              "--vcstype" "git"
              "--vcsuri" "$VCS_URI"
              "--repo-path" "$REPO_PATH"
              "--branch" "$BRANCH"
              "--lifecycle" "PENDING"
              "--version" "$INPUT_VERSION"
            )
            
            if [ -n "$COMMIT_MESSAGE" ]; then
              add_release_args+=("--commitmessage" "$COMMIT_MESSAGE")
            fi
            
            if [ -n "$COMMIT_DATE" ]; then
              add_release_args+=("--date" "$COMMIT_DATE")
            fi
            
            if [ -n "$COMMITS_BASE64" ]; then
              add_release_args+=("--commits" "$COMMITS_BASE64")
            fi
            
            if [ "$CREATE_COMPONENT" = "true" ]; then
              add_release_args+=("--createcomponent" "true")
              add_release_args+=("--createcomponent-version-schema" "$CREATE_COMPONENT_VERSION_SCHEMA")
              add_release_args+=("--createcomponent-branch-version-schema" "$CREATE_COMPONENT_BRANCH_VERSION_SCHEMA")
            fi
            
            if [ "$ALLOW_REBUILD" = "true" ]; then
              add_release_args+=("--rebuild" "true")
            fi
            
            if [ -n "$COMPONENT" ]; then
              add_release_args+=("--component" "$COMPONENT")
            fi

            # Forward PR metadata when running on a `pull_request`
            # event so ReARM upserts the first-class PullRequest entity
            # (keyed by target VCS + identity) and advances its head to
            # the just-persisted SCE. PR_NUMBER / PR_STATE are empty on
            # non-PR events. PR_NUMBER is forwarded as `--pr-identity`
            # because the ReARM PR entity uses an opaque string id —
            # GitHub PR numbers, GitLab MR iids and Gerrit change-ids
            # all flow through the same flag. Requires CLI ≥ 26.05.3.
            if [ -n "$PR_NUMBER" ] && [ -n "$PR_STATE" ]; then
              add_release_args+=("--pr-identity" "$PR_NUMBER")
              add_release_args+=("--pr-state" "$PR_STATE")
              [ -n "$PR_TITLE" ] && add_release_args+=("--pr-title" "$PR_TITLE")
              [ -n "$PR_TARGET_BRANCH" ] && add_release_args+=("--pr-target-branch-name" "$PR_TARGET_BRANCH")
              [ -n "$PR_ENDPOINT" ] && add_release_args+=("--pr-endpoint" "$PR_ENDPOINT")
            fi

            rearm "${add_release_args[@]}"

            FULL_VERSION="$INPUT_VERSION"
            SHORT_VERSION="$INPUT_VERSION"
            echo "Pending release initialized successfully with provided version"
          else
            # No version provided - use getversion to obtain version and create pending release
            echo "Getting version from ReARM..."
            
            get_version_args=(
              "getversion"
              "-k" "$REARM_API_KEY"
              "-i" "$rearm_api_id"
              "-u" "$REARM_API_URL"
              "-b" "$BRANCH"
              "--commit" "$COMMIT"
              "--vcstype" "git"
              "--vcsuri" "$VCS_URI"
              "--repo-path" "$REPO_PATH"
            )

            # `allow_rebuild=true` opts in to the CLI's --rebuild flag,
            # which reuses the existing version assignment for this
            # (component, branch, commit) instead of failing the duplicate.
            # Off by default so the V31 backend dedup gate (rearm-saas,
            # 2026-05) catches accidental races on the same head as a hard
            # CI failure rather than silently returning the prior version.
            # Requires CLI ≥ 26.05.4.
            if [ "$ALLOW_REBUILD" = "true" ]; then
              get_version_args+=("--rebuild")
            fi
            
            if [ -n "$COMMIT_MESSAGE" ]; then
              get_version_args+=("--commitmessage" "$COMMIT_MESSAGE")
            fi
            
            if [ -n "$COMMIT_DATE" ]; then
              get_version_args+=("--date" "$COMMIT_DATE")
            fi
            
            if [ -n "$COMMITS_BASE64" ]; then
              get_version_args+=("--commits" "$COMMITS_BASE64")
            fi
            
            if [ "$CREATE_COMPONENT" = "true" ]; then
              get_version_args+=("--createcomponent" "true")
              get_version_args+=("--createcomponent-version-schema" "$CREATE_COMPONENT_VERSION_SCHEMA")
              get_version_args+=("--createcomponent-branch-version-schema" "$CREATE_COMPONENT_BRANCH_VERSION_SCHEMA")
            fi
            
            if [ -n "$COMPONENT" ]; then
              get_version_args+=("--component" "$COMPONENT")
            fi

            # Forward PR metadata when running on a `pull_request`
            # event — same shape as the addrelease branch above. The
            # backend upserts the PullRequest entity at getversion
            # time too when SCE/commits are present (and onlyversion
            # is not set), so the PR row is registered as early as
            # possible. Requires CLI ≥ 26.05.3.
            if [ -n "$PR_NUMBER" ] && [ -n "$PR_STATE" ]; then
              get_version_args+=("--pr-identity" "$PR_NUMBER")
              get_version_args+=("--pr-state" "$PR_STATE")
              [ -n "$PR_TITLE" ] && get_version_args+=("--pr-title" "$PR_TITLE")
              [ -n "$PR_TARGET_BRANCH" ] && get_version_args+=("--pr-target-branch-name" "$PR_TARGET_BRANCH")
              [ -n "$PR_ENDPOINT" ] && get_version_args+=("--pr-endpoint" "$PR_ENDPOINT")
            fi

            if ! GET_VERSION_OUTPUT=$(rearm "${get_version_args[@]}" 2>&1); then
              echo "ERROR: rearm getversion failed:" >&2
              echo "$GET_VERSION_OUTPUT" >&2
              exit 1
            fi
            echo "ReARM getversion output: $GET_VERSION_OUTPUT"
            
            # Parse version from JSON response
            FULL_VERSION=$(echo "$GET_VERSION_OUTPUT" | jq -r '.version // empty' 2>/dev/null || echo "")
            SHORT_VERSION=$(echo "$GET_VERSION_OUTPUT" | jq -r '.dockerTagSafeVersion // empty' 2>/dev/null || echo "$FULL_VERSION")
            RELEASE_ALREADY_EXISTS=$(echo "$GET_VERSION_OUTPUT" | jq -r '.releaseAlreadyExists // false' 2>/dev/null || echo "false")
            
            echo "Got version from ReARM: $FULL_VERSION"
            
            # If release already exists, re-check with the obtained version
            if [ "$RELEASE_ALREADY_EXISTS" = "true" ]; then
              echo "Release already exists, re-checking latest release with obtained version..."
              get_latest_release "$FULL_VERSION" || true
              echo "Updated DO_BUILD: $DO_BUILD"
            fi
            
            echo "Pending release initialized successfully via getversion"
          fi
        else
          echo "No changes detected, skipping build"
        fi
        
        # Step 3: Sync branches
        echo "Synchronizing branches with ReARM..."
        SKIP_BRANCH_SYNC="false"
        LIVE_BRANCHES=""
        
        GIT_BRANCHES=$(git branch -r --format='%(refname)' 2>/dev/null || echo "")
        
        if [ -z "$GIT_BRANCHES" ]; then
          echo "Warning: No branches found. Skipping branch sync."
          echo "To enable branch sync, use fetch-depth: 0 in your checkout step."
          SKIP_BRANCH_SYNC="true"
        else
          # Filter out detached commit refs (40-char hex hashes)
          VALID_BRANCHES=""
          while IFS= read -r line; do
            branch_name="${line#refs/remotes/origin/}"
            if ! [[ "$branch_name" =~ ^[0-9a-f]{40}$ ]]; then
              if [ -n "$VALID_BRANCHES" ]; then
                VALID_BRANCHES="$VALID_BRANCHES"$'\n'"$line"
              else
                VALID_BRANCHES="$line"
              fi
            fi
          done <<< "$GIT_BRANCHES"
          
          if [ -z "$VALID_BRANCHES" ]; then
            echo "Warning: Only detached commit refs found (shallow/detached checkout). Skipping branch sync."
            echo "To enable branch sync, use fetch-depth: 0 in your checkout step."
            SKIP_BRANCH_SYNC="true"
          else
            LIVE_BRANCHES=$(echo "$VALID_BRANCHES" | base64 -w 0 2>/dev/null || echo "$VALID_BRANCHES" | base64 2>/dev/null)
          fi
        fi
        
        if [ "$SKIP_BRANCH_SYNC" = "false" ]; then
          sync_branches_args=(
            "syncbranches"
            "-k" "$REARM_API_KEY"
            "-i" "$rearm_api_id"
            "-u" "$REARM_API_URL"
            "--vcsuri" "$VCS_URI"
            "--repo-path" "$REPO_PATH"
            "--livebranches" "$LIVE_BRANCHES"
          )
          
          if [ -n "$COMPONENT" ]; then
            sync_branches_args+=("--component" "$COMPONENT")
          fi
          
          rearm "${sync_branches_args[@]}"
          
          echo "Branches synchronized successfully"
        fi
        
        # Set output variables
        echo "do_build=$DO_BUILD" >> $GITHUB_OUTPUT
        echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
        echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT
        echo "build_start=$BUILD_START" >> $GITHUB_OUTPUT
        echo "commit_list=$COMMITS_BASE64" >> $GITHUB_OUTPUT
        echo "sce_commit=$COMMIT" >> $GITHUB_OUTPUT
        echo "sce_commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
        echo "sce_commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
        echo "sce_vcs_uri=$VCS_URI" >> $GITHUB_OUTPUT
        
        # Set environment variables for subsequent steps
        echo "REARM_DO_BUILD=$DO_BUILD" >> $GITHUB_ENV
        echo "REARM_LAST_COMMIT=$LAST_COMMIT" >> $GITHUB_ENV
        echo "REARM_FULL_VERSION=$FULL_VERSION" >> $GITHUB_ENV
        echo "REARM_SHORT_VERSION=$SHORT_VERSION" >> $GITHUB_ENV
        echo "REARM_BUILD_START=$BUILD_START" >> $GITHUB_ENV
        echo "REARM_BUILD_LIFECYCLE=REJECTED" >> $GITHUB_ENV
        
        echo "Full Version: $FULL_VERSION"
        echo "Short Version: $SHORT_VERSION"
        
        if [ "$DO_BUILD" = "true" ]; then
          echo "Release initialized"
        else
          echo "No build needed"
        fi
    - id: invisible-char-check
      if: ${{ inputs.enable_invisible_char_check == 'true' && steps.initialize.outputs.do_build == 'true' }}
      name: Scan for invisible/trojan source characters
      shell: bash
      env:
        LAST_COMMIT: ${{ steps.initialize.outputs.last_commit }}
        # Match the source-branch / PR-head resolution from the
        # initialize step above so the diff is scoped to the same
        # commits the release was registered against.
        COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      run: |
        set -euo pipefail
        cd ${{ inputs.repo_path }}

        mkdir -p /tmp/reliza
        FILES_LIST=/tmp/reliza/invisible-char-files.txt

        if [ -n "$LAST_COMMIT" ] && [ "$LAST_COMMIT" != "null" ] && git cat-file -t "$LAST_COMMIT" >/dev/null 2>&1; then
          echo "Scanning files changed in ${LAST_COMMIT}..${COMMIT} (added/modified only)"
          git diff -z --name-only --diff-filter=AM "$LAST_COMMIT" "$COMMIT" -- . > "$FILES_LIST"
        else
          if [ -n "$LAST_COMMIT" ] && [ "$LAST_COMMIT" != "null" ]; then
            echo "last_commit ${LAST_COMMIT} not available locally (shallow checkout?) — scanning all tracked files."
            echo "Use fetch-depth: 0 in checkout to enable diff-scoped scanning."
          else
            echo "No last_commit available (first build) — scanning all tracked files."
          fi
          git ls-files -z > "$FILES_LIST"
        fi

        # Drop binary files (favicon.ico, images, fonts, etc.) — anti-trojan-source
        # doesn't skip them and they trigger false positives on raw byte sequences.
        # grep -Iq uses the same NUL-byte heuristic as git's binary detection.
        FILTERED_LIST=/tmp/reliza/invisible-char-files.filtered
        : > "$FILTERED_LIST"
        while IFS= read -r -d '' f; do
          if [ -f "$f" ] && grep -Iq . "$f" 2>/dev/null; then
            printf '%s\0' "$f" >> "$FILTERED_LIST"
          fi
        done < "$FILES_LIST"
        mv "$FILTERED_LIST" "$FILES_LIST"

        echo "Files to scan (text only):"
        tr '\0' '\n' < "$FILES_LIST" | sed 's/^/  /'

        if [ ! -s "$FILES_LIST" ]; then
          echo "No text files to scan."
          rm -f "$FILES_LIST"
          exit 0
        fi

