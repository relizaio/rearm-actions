name: 'ReARM Finalize Release'
description: 'Submit Release metadata and finalize a release on ReARM - accepts artifact JSON from sbom-sign-scan action'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  rearm_api_id:
    description: "ReARM API Key ID"
    required: true
  rearm_api_key:
    description: "ReARM API Key"
    required: true
  image_full_name:
    description: "Full name of the Docker image with registry prefix"
    required: true
  image_digest:
    description: "SHA 256 digest of the image artifact"
    required: false
  rearm_build_start:
    description: "Build start time"
    required: true
  rearm_short_version:
    description: "Docker and filesystem safe version from ReARM for this release"
    required: true
  rearm_full_version:
    description: "Version obtained from ReARM for this release"
    required: true
  rearm_build_lifecycle:
    description: "Build lifecycle - [DRAFT | ASSEMBLED | REJECTED]"
    required: true
  rearm_api_url:
    description: "ReARM API URL"
    required: false
    default: 'https://demo.rearmhq.com'
  deliverable_type:
    description: "Type of artifact created by this release [CONTAINER, FILE]"
    required: false
    default: 'CONTAINER'
  commit_list:
    description: "Base64 encoded list of commits (from initialize action)"
    required: false
  sce_commit:
    description: "SCE commit hash (from initialize action)"
    required: false
  sce_commit_message:
    description: "SCE commit message (from initialize action)"
    required: false
  sce_commit_date:
    description: "SCE commit date (from initialize action)"
    required: false
  sce_vcs_uri:
    description: "SCE VCS URI (defaults to github.com/ this github repo)"
    required: false
  component:
    description: "Component UUID (optional)"
    required: false
  finalize_release:
    description: "Finalize the release after adding it (true/false)"
    required: false
    default: 'true'
  repo_path:
    description: "Repository path relative to workspace root"
    required: false
    default: "."
  send_sce_data:
    description: "Sends Source Code entry data along with the release, required for SCE SBOMs"
    required: false
    default: 'true'
  scearts:
    description: "Source Code Entry artifacts JSON array (output from sbom-sign-scan action)"
    required: false
  odelartsjson:
    description: "Output Deliverable artifacts JSON array (output from sbom-sign-scan action)"
    required: false
  purl:
    description: "Package URL for the deliverable (output from sbom-sign-scan action for CONTAINER type)"
    required: false
runs:
  using: "composite"
  steps:
    - name: Instantiate Rearm status
      shell: bash
      run: |
        mkdir -p /tmp/reliza
        cd ${{ inputs.repo_path }}
        echo "" > /tmp/reliza/rearm_command
        echo -n "--lifecycle ${{inputs.rearm_build_lifecycle}} " >> /tmp/reliza/rearm_command

    - name: Set sce data
      shell: bash
      if: ${{ inputs.send_sce_data == 'true' }}
      run: |
        # Use commit_list from initialize action if provided
        if [ ! -z "${{inputs.commit_list}}" ]; then
          echo -n "--commits ${{inputs.commit_list}} " >> /tmp/reliza/rearm_command
        fi

        # Use SCE data from initialize action or fall back to github
        # context. On `pull_request` events github.sha is the synthetic
        # merge commit; prefer the PR's actual head SHA so the SCE
        # tracks the commit the developer pushed.
        sce_commit="${{inputs.sce_commit}}"
        if [ -z "$sce_commit" ]; then
          sce_commit="${{ github.event.pull_request.head.sha || github.sha }}"
        fi

        sce_vcs_uri="${{inputs.sce_vcs_uri}}"
        if [ -z "$sce_vcs_uri" ]; then
          sce_vcs_uri="github.com/${{github.repository}}"
        fi

        echo -n "--commit ${sce_commit} " >> /tmp/reliza/rearm_command

        if [ ! -z "${{inputs.sce_commit_message}}" ]; then
          echo -n "--commitmessage \"${{inputs.sce_commit_message}}\" " >> /tmp/reliza/rearm_command
        fi

        if [ ! -z "${{inputs.sce_commit_date}}" ]; then
          echo -n "--date ${{inputs.sce_commit_date}} " >> /tmp/reliza/rearm_command
        fi

        echo -n "--vcstype git --vcsuri ${sce_vcs_uri} --repo-path ${{inputs.repo_path}} " >> /tmp/reliza/rearm_command

    - name: Submit metadata to Rearm
      shell: bash
      run: |
        cd ${{ inputs.repo_path }}

        # Use purl from sbom-sign-scan if provided
        purl="${{inputs.purl}}"
        echo "deliverable purl=$purl"

        # Add scearts if provided and not empty
        scearts='${{ inputs.scearts }}'
        if [[ -n "$scearts" && "$scearts" != "" && "$scearts" != "[]" ]]; then
          echo -n "--scearts '${scearts}' " >> /tmp/reliza/rearm_command
        fi

        # Add odelartsjson if provided and not empty
        odelartsjson='${{ inputs.odelartsjson }}'
        if [[ -n "$odelartsjson" && "$odelartsjson" != "" && "$odelartsjson" != "[]" ]]; then
          echo -n "--odelartsjson '${odelartsjson}' " >> /tmp/reliza/rearm_command
        fi

        # Note: API key/ID are intentionally NOT written to /tmp/reliza/rearm_command —
        # they're injected only at eval time below so the debug `cat` and any on-disk
        # artifact never contain credentials.
        # On `pull_request` events github.ref_name is `<N>/merge` (the
        # synthetic ref) — use the PR's head_ref so the release lands
        # on the source branch, unified with pre-PR commits.
        rearm_branch_name="${{ github.head_ref || github.ref_name }}"
        # github.sha on PR events is the synthetic merge commit; the
        # buildid label uses the actual head SHA for traceability.
        rearm_head_sha="${{ github.event.pull_request.head.sha || github.sha }}"
        echo -n "-b ${rearm_branch_name} -u ${{ inputs.rearm_api_url }} \
          -v \"${{ inputs.rearm_full_version }}\" " >> /tmp/reliza/rearm_command
        echo -n "--odelid ${{inputs.image_full_name}} " >> /tmp/reliza/rearm_command
        echo -n "--odelbuildid github${{github.action}}${rearm_head_sha} " >> /tmp/reliza/rearm_command
        echo -n "--odelbuilduri https://github.com/${{github.repository}}/actions/runs/${{github.run_id}} " >> /tmp/reliza/rearm_command
        if [[ -n "$purl" ]]; then
          echo -n "--odelidentifiers \"PURL:${purl}\" " >> /tmp/reliza/rearm_command
        fi
        echo -n '--odelcimeta "GitHub Actions" ' >> /tmp/reliza/rearm_command
        echo -n "--odeltype ${{inputs.deliverable_type}} " >> /tmp/reliza/rearm_command

        if [[ "${{inputs.image_digest}}" != "" ]]
        then
          echo -n "--odeldigests ${{inputs.image_digest}} " >> /tmp/reliza/rearm_command
        fi
        if [ ! -z "${{inputs.component}}" ]
        then
          echo -n "--component ${{inputs.component}} " >> /tmp/reliza/rearm_command
        fi
        echo -n "--datestart ${{inputs.rearm_build_start}} " >> /tmp/reliza/rearm_command
        echo -n "--dateend $(date -Iseconds) " >> /tmp/reliza/rearm_command

        # Forward PR metadata when running on a `pull_request` event
        # so ReARM upserts the first-class PullRequest entity (keyed
        # by target VCS + identity) and advances its head to the
        # release's SCE. The GitHub PR number is forwarded as
        # `--pr-identity` because the entity uses an opaque string id.
        # PR_NUMBER is empty on non-PR events. Requires CLI ≥ 26.05.1.
        PR_NUMBER='${{ github.event.pull_request.number }}'
        if [ -n "$PR_NUMBER" ]; then
          PR_TITLE='${{ github.event.pull_request.title }}'
          PR_TARGET_BRANCH='${{ github.event.pull_request.base.ref }}'
          PR_ENDPOINT='${{ github.event.pull_request.html_url }}'
          echo -n "--pr-identity ${PR_NUMBER} --pr-state OPEN " >> /tmp/reliza/rearm_command
          [ -n "$PR_TITLE" ] && echo -n "--pr-title \"${PR_TITLE}\" " >> /tmp/reliza/rearm_command
          [ -n "$PR_TARGET_BRANCH" ] && echo -n "--pr-target-branch-name ${PR_TARGET_BRANCH} " >> /tmp/reliza/rearm_command
          [ -n "$PR_ENDPOINT" ] && echo -n "--pr-endpoint ${PR_ENDPOINT} " >> /tmp/reliza/rearm_command
        fi
        # debug — safe: rearm_command contains no credentials
        cat /tmp/reliza/rearm_command
        # send data — credentials injected only at eval time, never written to disk
        if rearm_output=$(eval rearm addrelease -k '${{ inputs.rearm_api_key }}' -i '${{ inputs.rearm_api_id }}' $(cat /tmp/reliza/rearm_command) 2>&1); then
          echo "Success: $rearm_output"
        else
          exit_code=$?
          echo "ERROR: rearm addrelease failed (exit code $exit_code):" >&2
          echo "$rearm_output" >&2
          exit $exit_code
        fi

        # Extract UUID from JSON output using jq
        release_uuid=$(echo "$rearm_output" | jq -r '.data.addReleaseProgrammatic.uuid // empty')
        echo "Extracted release UUID: $release_uuid"

        # Conditionally finalize release
        if [[ "${{ inputs.finalize_release }}" == 'true' && -n "$release_uuid" ]]; then
          echo "Finalizing release with UUID: $release_uuid"
          if ! finalizer_output=$(rearm releasefinalizer --releaseid "$release_uuid" -u '${{ inputs.rearm_api_url }}' -i '${{ inputs.rearm_api_id }}' -k '${{ inputs.rearm_api_key }}' 2>&1); then
            exit_code=$?
            echo "ERROR: rearm releasefinalizer failed (exit code $exit_code):" >&2
            echo "$finalizer_output" >&2
            exit $exit_code
          fi
          echo "$finalizer_output"
        else
          echo "Skipping release finalization."
        fi
        echo "completed sending release metadata"

    - name: Fail build if rearm status is rejected
      shell: bash
      run: |
        echo "checking build status..."
        cd ${{ inputs.repo_path }}
        if [[ "${{inputs.rearm_build_lifecycle}}" == "REJECTED" ]]
        then
          echo "Failing build since Rearm build Lifecycle is rejected"
          exit 1
        fi
post:
  shell: bash
  run: |
    rm -rf /tmp/reliza/*
