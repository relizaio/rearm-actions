name: 'ReARM Finalize Release'
description: 'Submit Release metadata and finalize a release on ReARM - accepts artifact JSON from sbom-sign-scan action'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  rearm_api_id:
    description: "ReARM API Key ID"
    required: true
  rearm_api_key:
    description: "ReARM API Key"
    required: true
  image_full_name:
    description: "Full name of the Docker image with registry prefix"
    required: true
  image_digest:
    description: "SHA 256 digest of the image artifact"
    required: false
  rearm_build_start:
    description: "Build start time"
    required: true
  rearm_short_version:
    description: "Docker and filesystem safe version from ReARM for this release"
    required: true
  rearm_full_version:
    description: "Version obtained from ReARM for this release"
    required: true
  rearm_build_lifecycle:
    description: "Build lifecycle - [DRAFT | ASSEMBLED | REJECTED]"
    required: true
  rearm_api_url:
    description: "ReARM API URL"
    required: false
    default: 'https://demo.rearmhq.com'
  deliverable_type:
    description: "Type of artifact created by this release [CONTAINER, FILE]"
    required: false
    default: 'CONTAINER'
  commit_list:
    description: "Base64 encoded list of commits (from initialize action)"
    required: false
  sce_commit:
    description: "SCE commit hash (from initialize action)"
    required: false
  sce_commit_message:
    description: "SCE commit message (from initialize action)"
    required: false
  sce_commit_date:
    description: "SCE commit date (from initialize action)"
    required: false
  sce_vcs_uri:
    description: "SCE VCS URI (defaults to github.com/ this github repo)"
    required: false
  component:
    description: "Component UUID (optional)"
    required: false
  repo_path:
    description: "Repository path relative to workspace root"
    required: false
    default: "."
  send_sce_data:
    description: "Sends Source Code entry data along with the release, required for SCE SBOMs"
    required: false
    default: 'true'
  scearts:
    description: "Source Code Entry artifacts JSON array (output from sbom-sign-scan action)"
    required: false
  odelartsjson:
    description: "Output Deliverable artifacts JSON array (output from sbom-sign-scan action)"
    required: false
  purl:
    description: "Package URL for the deliverable (output from sbom-sign-scan action for CONTAINER type)"
    required: false
runs:
  using: "composite"
  steps:
    - name: Instantiate Rearm status
      shell: bash
      run: |
        mkdir -p /tmp/reliza
        cd ${INPUTS_REPO_PATH}
        echo "" > /tmp/reliza/rearm_command
        echo -n "--lifecycle ${INPUTS_REARM_BUILD_LIFECYCLE} " >> /tmp/reliza/rearm_command
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_REARM_BUILD_LIFECYCLE: ${{inputs.rearm_build_lifecycle}}

    - name: Set sce data
      shell: bash
      if: ${{ inputs.send_sce_data == 'true' }}
      # Bind the commit message to an env var rather than interpolating
      # ${{ inputs.sce_commit_message }} directly into the bash heredoc.
      # GitHub Actions expands template expressions BEFORE the shell
      # parses the script — so a value containing a literal `"` (which
      # `git revert` produces by default: `Revert "original subject"`)
      # turns the surrounding bash quoting inside-out and the step dies
      # with `syntax error near unexpected token`. Reading the value via
      # $SCE_COMMIT_MESSAGE keeps the contents out of the script source.
      env:
        SCE_COMMIT_MESSAGE: ${{ inputs.sce_commit_message }}
        INPUTS_COMMIT_LIST: ${{inputs.commit_list}}
        INPUTS_SCE_COMMIT: ${{inputs.sce_commit}}
        INPUTS_SCE_VCS_URI: ${{inputs.sce_vcs_uri}}
        INPUTS_SCE_COMMIT_DATE: ${{inputs.sce_commit_date}}
        INPUTS_REPO_PATH: ${{inputs.repo_path}}
      run: |
        # Use commit_list from initialize action if provided
        if [ ! -z "${INPUTS_COMMIT_LIST}" ]; then
          echo -n "--commits ${INPUTS_COMMIT_LIST} " >> /tmp/reliza/rearm_command
        fi

        # Use SCE data from initialize action or fall back to github
        # context. On `pull_request` events github.sha is the synthetic
        # merge commit; prefer the PR's actual head SHA so the SCE
        # tracks the commit the developer pushed.
        sce_commit="${INPUTS_SCE_COMMIT}"
        if [ -z "$sce_commit" ]; then
          sce_commit="${{ github.event.pull_request.head.sha || github.sha }}"
        fi

        sce_vcs_uri="${INPUTS_SCE_VCS_URI}"
        if [ -z "$sce_vcs_uri" ]; then
          sce_vcs_uri="github.com/${{github.repository}}"
        fi

        echo -n "--commit ${sce_commit} " >> /tmp/reliza/rearm_command

        # The rearm_command file is later passed through `eval $(cat …)`,
        # which re-tokenises the line on whitespace. To keep the message
        # as a single word regardless of its contents, single-quote-wrap
        # after escaping embedded single quotes (the standard
        # `'\''` dance). Handles double quotes, $, `, etc.
        if [ -n "$SCE_COMMIT_MESSAGE" ]; then
          escaped=$(printf "%s" "$SCE_COMMIT_MESSAGE" | sed "s/'/'\\\\''/g")
          echo -n "--commitmessage '$escaped' " >> /tmp/reliza/rearm_command
        fi

        if [ ! -z "${INPUTS_SCE_COMMIT_DATE}" ]; then
          echo -n "--date ${INPUTS_SCE_COMMIT_DATE} " >> /tmp/reliza/rearm_command
        fi

        echo -n "--vcstype git --vcsuri ${sce_vcs_uri} --repo-path ${INPUTS_REPO_PATH} " >> /tmp/reliza/rearm_command

    - name: Submit metadata to Rearm
      shell: bash
      run: |
        cd ${INPUTS_REPO_PATH}

        # Use purl from sbom-sign-scan if provided
        purl="${INPUTS_PURL}"
        echo "deliverable purl=$purl"

        # Add scearts if provided and not empty
        scearts='${INPUTS_SCEARTS}'
        if [[ -n "$scearts" && "$scearts" != "" && "$scearts" != "[]" ]]; then
          echo -n "--scearts '${scearts}' " >> /tmp/reliza/rearm_command
        fi

        # Add odelartsjson if provided and not empty
        odelartsjson='${INPUTS_ODELARTSJSON}'
        if [[ -n "$odelartsjson" && "$odelartsjson" != "" && "$odelartsjson" != "[]" ]]; then
          echo -n "--odelartsjson '${odelartsjson}' " >> /tmp/reliza/rearm_command
        fi

        # Note: API key/ID are intentionally NOT written to /tmp/reliza/rearm_command —
        # they're injected only at eval time below so the debug `cat` and any on-disk
        # artifact never contain credentials.
        # On `pull_request` events github.ref_name is `<N>/merge` (the
        # synthetic ref) — use the PR's head_ref so the release lands
        # on the source branch, unified with pre-PR commits.
        rearm_branch_name="$GITHUB_HEAD_REF_OR_REF_NAME"
        # github.sha on PR events is the synthetic merge commit; the
        # buildid label uses the actual head SHA for traceability.
        rearm_head_sha="$GITHUB_HEAD_SHA"
        echo -n "-b ${rearm_branch_name} -u ${INPUTS_REARM_API_URL} \
          -v \"${INPUTS_REARM_FULL_VERSION}\" " >> /tmp/reliza/rearm_command
        echo -n "--odelid ${INPUTS_IMAGE_FULL_NAME} " >> /tmp/reliza/rearm_command
        echo -n "--odelbuildid github${GITHUB_ACTION}${rearm_head_sha} " >> /tmp/reliza/rearm_command
        echo -n "--odelbuilduri https://github.com/${{github.repository}}/actions/runs/${{github.run_id}} " >> /tmp/reliza/rearm_command
        if [[ -n "$purl" ]]; then
          echo -n "--odelidentifiers \"PURL:${purl}\" " >> /tmp/reliza/rearm_command
        fi
        echo -n '--odelcimeta "GitHub Actions" ' >> /tmp/reliza/rearm_command
        echo -n "--odeltype ${INPUTS_DELIVERABLE_TYPE} " >> /tmp/reliza/rearm_command

        if [[ "${INPUTS_IMAGE_DIGEST}" != "" ]]
        then
          echo -n "--odeldigests ${INPUTS_IMAGE_DIGEST} " >> /tmp/reliza/rearm_command
        fi
        if [ ! -z "${INPUTS_COMPONENT}" ]
        then
          echo -n "--component ${INPUTS_COMPONENT} " >> /tmp/reliza/rearm_command
        fi
        echo -n "--datestart ${INPUTS_REARM_BUILD_START} " >> /tmp/reliza/rearm_command
        echo -n "--dateend $(date -Iseconds) " >> /tmp/reliza/rearm_command

        # Forward PR metadata when running on a `pull_request` event
        # so ReARM upserts the first-class PullRequest entity (keyed
        # by target VCS + identity) and advances its head to the
        # release's SCE. The GitHub PR number is forwarded as
        # `--pr-identity` because the entity uses an opaque string id.
        # PR_NUMBER is empty on non-PR events. Requires CLI ≥ 26.05.5.
        PR_NUMBER='${{ github.event.pull_request.number }}'
        if [ -n "$PR_NUMBER" ]; then
          PR_TITLE='${GITHUB_EVENT_PULL_REQUEST_TITLE}'
          PR_TARGET_BRANCH='${GITHUB_EVENT_PULL_REQUEST_BASE_REF}'
          PR_ENDPOINT='${GITHUB_EVENT_PULL_REQUEST_HTML_URL}'
          echo -n "--pr-identity ${PR_NUMBER} --pr-state OPEN " >> /tmp/reliza/rearm_command
          [ -n "$PR_TITLE" ] && echo -n "--pr-title \"${PR_TITLE}\" " >> /tmp/reliza/rearm_command
          [ -n "$PR_TARGET_BRANCH" ] && echo -n "--pr-target-branch-name ${PR_TARGET_BRANCH} " >> /tmp/reliza/rearm_command
          [ -n "$PR_ENDPOINT" ] && echo -n "--pr-endpoint ${PR_ENDPOINT} " >> /tmp/reliza/rearm_command
        fi
        # debug — safe: rearm_command contains no credentials
        cat /tmp/reliza/rearm_command
        # send data — credentials injected only at eval time, never written to disk
        if rearm_output=$(eval rearm addrelease -k '${INPUTS_REARM_API_KEY}' -i '${INPUTS_REARM_API_ID}' $(cat /tmp/reliza/rearm_command) 2>&1); then
          echo "Success: $rearm_output"
        else
          exit_code=$?
          echo "ERROR: rearm addrelease failed (exit code $exit_code):" >&2
          echo "$rearm_output" >&2
          exit $exit_code
        fi

        # Extract UUID from JSON output using jq
        release_uuid=$(echo "$rearm_output" | jq -r '.data.addReleaseProgrammatic.uuid // empty')
        echo "Completed sending release metadata. Release UUID: $release_uuid"
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_PURL: ${{inputs.purl}}
        INPUTS_SCEARTS: ${{ inputs.scearts }}
        INPUTS_ODELARTSJSON: ${{ inputs.odelartsjson }}
        INPUTS_REARM_API_URL: ${{ inputs.rearm_api_url }}
        INPUTS_REARM_FULL_VERSION: ${{ inputs.rearm_full_version }}
        INPUTS_IMAGE_FULL_NAME: ${{inputs.image_full_name}}
        INPUTS_DELIVERABLE_TYPE: ${{inputs.deliverable_type}}
        INPUTS_IMAGE_DIGEST: ${{inputs.image_digest}}
        INPUTS_COMPONENT: ${{inputs.component}}
        INPUTS_REARM_BUILD_START: ${{inputs.rearm_build_start}}
        GITHUB_EVENT_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
        GITHUB_EVENT_PULL_REQUEST_BASE_REF: ${{ github.event.pull_request.base.ref }}
        GITHUB_EVENT_PULL_REQUEST_HTML_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_HEAD_REF_OR_REF_NAME: ${{ github.head_ref || github.ref_name }}
        GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        INPUTS_REARM_API_KEY: ${{ inputs.rearm_api_key }}
        INPUTS_REARM_API_ID: ${{ inputs.rearm_api_id }}
    - name: Fail build if rearm status is rejected
      shell: bash
      run: |
        echo "checking build status..."
        cd ${INPUTS_REPO_PATH}
        if [[ "${INPUTS_REARM_BUILD_LIFECYCLE}" == "REJECTED" ]]
        then
          echo "Failing build since Rearm build Lifecycle is rejected"
          exit 1
        fi
      env:
        INPUTS_REPO_PATH: ${{ inputs.repo_path }}
        INPUTS_REARM_BUILD_LIFECYCLE: ${{inputs.rearm_build_lifecycle}}
post:
  shell: bash
  run: |
    rm -rf /tmp/reliza/*
